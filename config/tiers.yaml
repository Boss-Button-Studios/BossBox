# config/tiers.yaml
#
# Tier assignment and fallback chains (Section 5 and 6.3).
#
# eviction_priority: ordered list of tiers to evict when VRAM is tight,
#   lowest priority first. Nano is intentionally absent — it is never evicted.
#   See Section 5.5 for the full eviction order.

eviction_priority:
  - reasoner
  - specialist
  - micro

tiers:
  nano:
    primary: ollama/smollm:360m
    always_loaded: true
    fallback: []

  micro:
    primary: ollama/smollm:1.7b
    always_loaded: false
    fallback: []

  specialist:
    primary: ollama/qwen2.5-coder:1.5b
    always_loaded: false
    fallback: []

  reasoner:
    primary: ollama/deepseek-r1:7b
    always_loaded: false
    fallback:
      - anthropic/claude-haiku-4-5-20251001
      - openai/gpt-4o-mini

  cloud:
    primary: anthropic/claude-haiku-4-5-20251001
    always_loaded: false
    fallback:
      - openai/gpt-4o-mini
