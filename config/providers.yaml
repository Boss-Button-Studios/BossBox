# BossBox provider configuration
#
# Cloud provider sections (anthropic, openai) are optional.
# Missing API keys resolve to null rather than raising — the provider will be
# registered as unavailable and the router will skip it silently.
#
# Set keys via environment variables (recommended) or paste values directly
# (not recommended — they will appear in shell history and version control).

providers:
  ollama:
    base_url: http://localhost:11434

  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    default_model: claude-haiku-4-5

  openai:
    api_key: ${OPENAI_API_KEY}
    default_model: gpt-4o-mini
