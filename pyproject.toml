[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "bossbox"
version = "0.1.0"
description = "Local-first AI workbench — Boss Button Studios"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    { name = "Boss Button Studios" }
]
# Runtime dependencies — installed when the package is deployed.
# Groups below separate what is available at each build stage.
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
# Full runtime — install when a network-connected environment is available.
full = [
    "pyyaml>=6.0",
    "httpx>=0.27",
    "aiohttp>=3.9",
    "pymupdf>=1.24",
    "pytesseract>=0.3.13",
    "python-docx>=1.1",
    "beautifulsoup4>=4.12",
    "lxml>=5.2",
    "customtkinter>=5.2",
    "plyer>=2.1",
    "python-dateutil>=2.9",
    "typing-extensions>=4.11",
]
# Dev — test runner and linter only; added as network becomes available.
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.4",
]

[project.scripts]
bossbox = "bossbox.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["bossbox*"]

[tool.setuptools.package-data]
bossbox = ["py.typed"]
"*" = ["*.yaml", "*.yml", "*.md"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.ruff]
line-length = 100
target-version = "py311"
